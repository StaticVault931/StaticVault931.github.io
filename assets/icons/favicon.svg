<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>
  <!-- Black base with rounded corners -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#050505"/>
  <!-- Use the PNG as the icon content, clipped to rounded rect -->
  <image href="favicon.png" x="2" y="2" width="96" height="96" clip-path="url(#rounded)" preserveAspectRatio="xMidYMid meet"/>
</svg>
